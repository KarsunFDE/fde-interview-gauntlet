<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FDE Gauntlet — Interview & System Design</title>
  <meta name="description" content="Speak your answers. Design real systems. AI critics score them. Top scorer banks the daily prize." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Excalidraw diagram canvas (System Design Simulator). React + ReactDOM +
       the Excalidraw UMD bundle from CDN — no build step. EXCALIDRAW_ASSET_PATH
       must be set BEFORE the bundle so fonts/assets resolve. -->
  <script>window.EXCALIDRAW_ASSET_PATH = "https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/";</script>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>

  <link rel="stylesheet" href="css/site.css?v=20260625-1" />
</head>
<body>
  <header id="appHeader" class="app-header"></header>
  <main id="app" class="app-main"></main>
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <!-- config first, then helpers, then features.
       NOTE: bump ?v= on every JS/CSS change so returning users (whose browsers
       cached the old files under GitHub Pages' 10-min cache) load the new code
       the moment index.html revalidates — no manual hard-refresh needed. -->
  <script src="config.js?v=20260625-1"></script>
  <script src="js/api.js?v=20260625-1"></script>
  <script src="js/stt.js?v=20260625-1"></script>
  <script src="js/design.js?v=20260625-1"></script>
  <script src="js/trainer.js?v=20260625-1"></script>
  <script src="js/app.js?v=20260625-1"></script>
</body>
</html>
